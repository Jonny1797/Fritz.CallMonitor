name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            dist_name: fritz-callhistory
            asset_name: fritz-callhistory-linux-x86_64
          - os: windows-latest
            dist_name: fritz-callhistory.exe
            asset_name: fritz-callhistory-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run pyinstaller packaging/fritz_callhistory.spec

      - name: Rename artifact
        shell: bash
        run: mv "dist/${{ matrix.dist_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog section for this version
        run: |
          scripts/changelog_section.sh "${{ github.ref_name }}" > release_notes.md
          cat release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            artifacts/fritz-callhistory-linux-x86_64/fritz-callhistory-linux-x86_64
            artifacts/fritz-callhistory-windows-x86_64.exe/fritz-callhistory-windows-x86_64.exe
