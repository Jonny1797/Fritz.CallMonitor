name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    # Adjust to whatever label your forgejo-runner exposes (see its
    # config.yaml labels: list) if this doesn't match your instance.
    runs-on: ubuntu-latest
    env:
      # This instance is reverse-proxied under a path prefix (ROOT_URL
      # https://mash.gaja-uranos.de/forgejo/). actions/checkout can't handle
      # that: its URL builder does `new URL(serverUrl).origin`, and
      # URL.origin structurally never includes a path, so the /forgejo
      # prefix gets silently dropped no matter what github-server-url is
      # set to. Hence the manual clone below instead of actions/checkout.
      # Adjust FORGEJO_BASE_URL if your instance's base URL differs.
      FORGEJO_BASE_URL: https://mash.gaja-uranos.de/forgejo
      # github.repository is this Forgejo repo's own <owner>/<repo> path,
      # which differs from its path on GitHub - set explicitly instead.
      GITHUB_REPO: Jonny1797/Fritz.CallMonitor
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q
          git config http.extraheader "Authorization: token ${TOKEN}"
          git fetch -q --depth 1 "${{ env.FORGEJO_BASE_URL }}/${{ github.repository }}.git" "${{ github.ref_name }}"
          git checkout -q FETCH_HEAD

      - name: Extract changelog section for this version
        run: |
          scripts/changelog_section.sh "${{ github.ref_name }}" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Wait for GitHub release assets
        # The GitHub and Forgejo workflows both trigger off the same tag
        # push, with no guaranteed order between the two remotes, and the
        # GitHub build (PyInstaller on Linux + Windows) takes a few minutes.
        # Rather than building here too (this runner is aarch64 and can't
        # produce the x86_64/Windows binaries GitHub does - see git log for
        # the earlier attempt and why it was reverted), poll GitHub's public
        # release API until both expected assets show up.
        run: |
          command -v jq >/dev/null || (apt-get update -qq && apt-get install -y -qq jq)

          tag="${{ github.ref_name }}"
          assets="fritz-callhistory-linux-x86_64 fritz-callhistory-windows-x86_64.exe"
          deadline=$((SECONDS + 1200))

          while :; do
            response=$(curl -s -w '\n%{http_code}' "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${tag}")
            http_status=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_status" = "200" ]; then
              missing=0
              for asset in $assets; do
                echo "$body" | jq -e --arg name "$asset" '.assets[] | select(.name == $name)' >/dev/null || missing=1
              done
              [ "$missing" -eq 0 ] && break
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for GitHub release '${tag}' with assets: ${assets}" >&2
              exit 1
            fi
            echo "GitHub release/assets for '${tag}' not ready yet, retrying in 15s..."
            sleep 15
          done

      - name: Download GitHub release assets
        run: |
          mkdir -p artifacts
          tag="${{ github.ref_name }}"
          for asset in fritz-callhistory-linux-x86_64 fritz-callhistory-windows-x86_64.exe; do
            curl -sL --fail -o "artifacts/${asset}" \
              "https://github.com/${GITHUB_REPO}/releases/download/${tag}/${asset}"
          done

      - name: Create Forgejo release
        env:
          # Requires Settings > Actions > General > "Read and write" access
          # for the repository's default token. If your instance doesn't
          # allow that, replace with a repo secret holding a personal
          # access token that has repository write scope.
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          command -v jq >/dev/null || (apt-get update -qq && apt-get install -y -qq jq)

          jq -n \
            --arg tag "${{ github.ref_name }}" \
            --arg name "${{ github.ref_name }}" \
            --rawfile body /tmp/release_notes.md \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}' \
            > /tmp/release_payload.json

          http_status=$(curl -s --show-error -o /tmp/release_response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/release_payload.json \
            "${{ env.FORGEJO_BASE_URL }}/api/v1/repos/${{ github.repository }}/releases")

          cat /tmp/release_response.json
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Release creation failed with HTTP $http_status" >&2
            exit 1
          fi

          jq -r '.id' /tmp/release_response.json > /tmp/release_id.txt

      - name: Upload release assets
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id=$(cat /tmp/release_id.txt)

          for asset in fritz-callhistory-linux-x86_64 fritz-callhistory-windows-x86_64.exe; do
            http_status=$(curl -s --show-error -o /tmp/asset_response.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: token ${TOKEN}" \
              -F "attachment=@artifacts/${asset};filename=${asset}" \
              "${{ env.FORGEJO_BASE_URL }}/api/v1/repos/${{ github.repository }}/releases/${release_id}/assets?name=${asset}")

            cat /tmp/asset_response.json
            if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
              echo "Asset upload failed for ${asset} with HTTP $http_status" >&2
              exit 1
            fi
          done
