name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    # Adjust to whatever label your forgejo-runner exposes (see its
    # config.yaml labels: list) if this doesn't match your instance.
    runs-on: ubuntu-latest
    env:
      # This instance is reverse-proxied under a path prefix (ROOT_URL
      # https://mash.gaja-uranos.de/forgejo/). actions/checkout can't handle
      # that: its URL builder does `new URL(serverUrl).origin`, and
      # URL.origin structurally never includes a path, so the /forgejo
      # prefix gets silently dropped no matter what github-server-url is
      # set to. Hence the manual clone below instead of actions/checkout.
      # Adjust FORGEJO_BASE_URL if your instance's base URL differs.
      FORGEJO_BASE_URL: https://mash.gaja-uranos.de/forgejo
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init -q
          git config http.extraheader "Authorization: token ${TOKEN}"
          git fetch -q --depth 1 "${{ env.FORGEJO_BASE_URL }}/${{ github.repository }}.git" "${{ github.ref_name }}"
          git checkout -q FETCH_HEAD

      - name: Extract changelog section for this version
        run: |
          scripts/changelog_section.sh "${{ github.ref_name }}" > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create Forgejo release
        env:
          # Requires Settings > Actions > General > "Read and write" access
          # for the repository's default token. If your instance doesn't
          # allow that, replace with a repo secret holding a personal
          # access token that has repository write scope.
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          command -v jq >/dev/null || (apt-get update -qq && apt-get install -y -qq jq)

          jq -n \
            --arg tag "${{ github.ref_name }}" \
            --arg name "${{ github.ref_name }}" \
            --rawfile body /tmp/release_notes.md \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}' \
            > /tmp/release_payload.json

          http_status=$(curl -s --show-error -o /tmp/release_response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @/tmp/release_payload.json \
            "${{ env.FORGEJO_BASE_URL }}/api/v1/repos/${{ github.repository }}/releases")

          cat /tmp/release_response.json
          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Release creation failed with HTTP $http_status" >&2
            exit 1
          fi
